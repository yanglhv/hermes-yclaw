<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>YClaw — three lobsters forming a Y</title>
  <!--
    Three stylized chibi lobsters arranged with one at the top and two at the
    bottom-left and bottom-right, claws meeting in the center, forming a Y.
    Single color (red-orange) on transparent background, no gradients.
  -->
  <g fill="#F04E23" fill-rule="evenodd">
    <!-- Top lobster (largest, vertical body) -->
    <g transform="translate(50 28)">
      <!-- body -->
      <ellipse cx="0" cy="0" rx="9" ry="11"/>
      <!-- tail segments -->
      <rect x="-5" y="9" width="10" height="3" rx="1.5"/>
      <rect x="-4" y="12" width="8" height="3" rx="1.5"/>
      <ellipse cx="0" cy="18" rx="5" ry="3"/>
      <!-- left claw (curving inward toward center) -->
      <path d="M -6 -2 C -14 -8, -16 -2, -12 4 C -8 6, -4 4, -4 0 Z"/>
      <circle cx="-13" cy="-3" r="2.5"/>
      <!-- right claw -->
      <path d="M 6 -2 C 14 -8, 16 -2, 12 4 C 8 6, 4 4, 4 0 Z"/>
      <circle cx="13" cy="-3" r="2.5"/>
      <!-- eyes -->
      <circle cx="-3" cy="-4" r="1.2" fill="#fff"/>
      <circle cx="3" cy="-4" r="1.2" fill="#fff"/>
      <circle cx="-3" cy="-4" r="0.6"/>
      <circle cx="3" cy="-4" r="0.6"/>
    </g>
    <!-- Bottom-left lobster (tilted up-right) -->
    <g transform="translate(28 70) rotate(-30)">
      <ellipse cx="0" cy="0" rx="7" ry="8"/>
      <rect x="-4" y="6" width="8" height="2.5" rx="1"/>
      <rect x="-3" y="9" width="6" height="2.5" rx="1"/>
      <ellipse cx="0" cy="13" rx="4" ry="2.5"/>
      <path d="M -4 -2 C -10 -6, -12 -1, -8 3 C -5 4, -2 3, -3 -1 Z"/>
      <circle cx="-9" cy="-2" r="2"/>
      <path d="M 4 -2 C 8 -4, 10 0, 7 2 C 5 3, 3 2, 3 0 Z"/>
      <circle cx="-2" cy="-3" r="0.9" fill="#fff"/>
      <circle cx="-2" cy="-3" r="0.5"/>
    </g>
    <!-- Bottom-right lobster (tilted up-left, mirror) -->
    <g transform="translate(72 70) rotate(30)">
      <ellipse cx="0" cy="0" rx="7" ry="8"/>
      <rect x="-4" y="6" width="8" height="2.5" rx="1"/>
      <rect x="-3" y="9" width="6" height="2.5" rx="1"/>
      <ellipse cx="0" cy="13" rx="4" ry="2.5"/>
      <path d="M 4 -2 C 10 -6, 12 -1, 8 3 C 5 4, 2 3, 3 -1 Z"/>
      <circle cx="9" cy="-2" r="2"/>
      <path d="M -4 -2 C -8 -4, -10 0, -7 2 C -5 3, -3 2, -3 0 Z"/>
      <circle cx="2" cy="-3" r="0.9" fill="#fff"/>
      <circle cx="2" cy="-3" r="0.5"/>
    </g>
    <!-- Central "joined claws" detail — small circle linking the three -->
    <circle cx="50" cy="48" r="3"/>
  </g>
</svg>
